  <script>
  (function() {
    const container = document.getElementById("paldo-ad");
    const sites = [
     'https://mploejuiashsatea.com?dVydX=1229258',
     'https://mploejuiashsatea.com?dndqf=1216944',
     'https://mploejuiashsatea.com?wIE9f=1218106',
        'https://mploejuiashsatea.com?CaSfc=1229259'
    ];

    let currentIndex = 0;
    let isLoading = false;
    let simulating = true;
    let simInterval;
    let scrollPos = 0;

    const iframe = container.querySelector("#iframe");
    const urlBox = container.querySelector("#url");
    const loading = container.querySelector("#loading");
    const errorBox = container.querySelector("#error");
    const cursor = container.querySelector("#cursor");
    const scroll = container.querySelector("#scroll");
    const thumb = container.querySelector("#thumb");

    // Store original functions to prevent tampering
    const originalSetTimeout = window.setTimeout;
    const originalSetInterval = window.setInterval;
    const originalRequestAnimationFrame = window.requestAnimationFrame;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function updateUrl() {
      try {
        const hostname = new URL(sites[currentIndex]).hostname;
        urlBox.textContent = hostname.replace('www.', '');
      } catch {
        urlBox.textContent = sites[currentIndex];
      }
    }

    function showLoading(show) {
      loading.style.display = show ? 'block' : 'none';
    }

    function showError(show) {
      errorBox.style.display = show ? 'flex' : 'none';
      iframe.style.display = show ? 'none' : 'block';
    }

    function loadSite(index) {
      if (isLoading) return;
      isLoading = true;

      showError(false);
      showLoading(true);
      updateUrl();

      iframe.src = '';

      originalSetTimeout(() => {
        iframe.src = sites[index];

        iframe.onload = () => {
          showLoading(false);
          isLoading = false;
          startSimulation();
        };

        iframe.onerror = () => {
          showLoading(false);
          showError(true);
          isLoading = false;
        };

        originalSetTimeout(() => {
          if (isLoading) {
            showLoading(false);
            showError(true);
            isLoading = false;
          }
        }, 5000);
      }, 100);
    }

    function navigate(direction) {
      if (isLoading) return;
      currentIndex = (currentIndex + direction + sites.length) % sites.length;
      loadSite(currentIndex);
    }

    // --- Improved Simulation Functions ---

    // Generates a random number within a human-like range
    function getRandomDelay(min, max) {
      return Math.random() * (max - min) + min;
    }

    // Generates a random point within the iframe's visible area
    function getRandomIframePoint() {
      const iframeRect = iframe.getBoundingClientRect();
      const padding = 20; // Keep cursor away from edges
      const x = getRandomDelay(padding, iframeRect.width - padding);
      const y = getRandomDelay(padding, iframeRect.height - padding);
      return { x, y };
    }

    // Simulates natural mouse movement to a target (x, y) with bezier curves and jitters
    function simulateNaturalMouseMovement(targetX, targetY, duration = 500) {
      return new Promise(resolve => {
        const startX = parseFloat(cursor.style.left) || getRandomIframePoint().x;
        const startY = parseFloat(cursor.style.top) || getRandomIframePoint().y;
        const startTime = performance.now();

        // Control points for a quadratic bezier curve
        const cp1x = getRandomDelay(Math.min(startX, targetX), Math.max(startX, targetX));
        const cp1y = getRandomDelay(Math.min(startY, targetY), Math.max(startY, targetY));

        function animateMouse(currentTime) {
          const elapsedTime = currentTime - startTime;
          let progress = Math.min(elapsedTime / duration, 1);

          // Quadratic Bezier curve calculation
          const x = (1 - progress) * (1 - progress) * startX +
                    2 * (1 - progress) * progress * cp1x +
                    progress * progress * targetX;
          const y = (1 - progress) * (1 - progress) * startY +
                    2 * (1 - progress) * progress * cp1y +
                    progress * progress * targetY;

          // Add subtle jitter
          const jitterX = (Math.random() - 0.5) * 2; // -1 to 1
          const jitterY = (Math.random() - 0.5) * 2; // -1 to 1

          cursor.style.left = (x + jitterX) + 'px';
          cursor.style.top = (y + jitterY) + 'px';

          if (progress < 1) {
            originalRequestAnimationFrame(animateMouse);
          } else {
            resolve();
          }
        }
        originalRequestAnimationFrame(animateMouse);
      });
    }

    async function simulateMouse() {
      const { x, y } = getRandomIframePoint();

      cursor.classList.add('active');
      await simulateNaturalMouseMovement(x, y, getRandomDelay(400, 1200)); // Vary movement duration
      await new Promise(resolve => originalSetTimeout(resolve, getRandomDelay(300, 1000))); // Pause after movement
      cursor.classList.remove('active');
    }

    async function simulateClick() {
      await simulateMouse(); // Move mouse before clicking
      cursor.classList.add('click');
      await new Promise(resolve => originalSetTimeout(resolve, getRandomDelay(50, 150))); // Click duration
      cursor.classList.remove('click');
      await new Promise(resolve => originalSetTimeout(resolve, getRandomDelay(200, 700))); // Pause after click
    }

    async function simulateScroll() {
      scroll.classList.add('active');
      const scrollAmount = getRandomDelay(50, 200); // Random scroll amount
      scrollPos = Math.max(0, Math.min(100, scrollPos + (Math.random() > 0.5 ? scrollAmount : -scrollAmount)));
      thumb.style.transform = `translateY(${scrollPos * 0.48}px)`;
      await new Promise(resolve => originalSetTimeout(resolve, getRandomDelay(700, 1800))); // Scroll duration
      scroll.classList.remove('active');
    }

    async function runSimulation() {
      if (!isLoading) {
        const actions = [simulateMouse, simulateClick, simulateScroll];
        const weights = [60, 20, 20]; // Adjusted weights for more mouse movement
        const total = weights.reduce((a, b) => a + b, 0);
        let random = Math.random() * total;

        for (let i = 0; i < actions.length; i++) {
          if (random < weights[i]) {
            await actions[i](); // Use await for sequential actions
            break;
          }
          random -= weights[i];
        }
      }
    }

    function startSimulation() {
      if (simInterval) clearInterval(simInterval);
      if (simulating) {
        // Vary the interval between actions to be more human-like
        simInterval = originalSetInterval(() => {
          runSimulation();
        }, getRandomDelay(2000, 8000)); // Actions every 2-8 seconds
      }
    }

    shuffle(sites);
    loadSite(currentIndex);
    // Vary the navigation interval
    originalSetInterval(() => { navigate(1); }, getRandomDelay(30000, 60000)); // Navigate every 30-60 seconds

    // Initial setup to make cursor appear at a random point
    originalSetTimeout(() => {
      const { x, y } = getRandomIframePoint();
      cursor.style.left = x + 'px';
      cursor.style.top = y + 'px';
    }, 0);
  })();
  </script>
